<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Genera Fogli Risposte — Punto della Strada</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f7f5f2;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 48px;
      box-shadow: 0 4px 24px rgba(70,38,120,.12);
      text-align: center;
      max-width: 420px;
    }
    h1 { color: #462678; font-size: 24px; margin-bottom: 8px; }
    p { color: #6b6660; font-size: 14px; margin-bottom: 32px; }
    button {
      background: #462678;
      color: #fff;
      border: none;
      padding: 14px 36px;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
      transition: background .2s;
    }
    button:hover { background: #5a35a0; }
    button:disabled { background: #aaa; cursor: default; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Punto della Strada</h1>
    <p>Genera il PDF A5 con le domande e gli spazi per le risposte, pronto per la stampa.</p>
    <button id="btn" onclick="genera()">Genera PDF</button>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.2/jspdf.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
  <script>
    // ── Data ──
    const PUBLIC_URL = 'https://puntodellastrada-42-2026.web.app';

    const AREAS = [
      {
        title: 'Strada',
        subtitle: 'Camminare e gia una risposta.',
        questions: [
          'Che cosa intendi quando dici "sono sulla strada"?',
          'Dove pensi di essere adesso nel tuo cammino di Rover/Scolta?',
          "C'e qualcosa che ti ha fermato ultimamente: una fatica, un dubbio, una pausa? Come l'hai affrontata e come ti ha cambiato?"
        ]
      },
      {
        title: 'Fede',
        subtitle: 'Il Vangelo di Emmaus: i discepoli che camminano senza riconoscerlo.',
        questions: [
          'Rileggi il brano lentamente, nota i dettagli, nomi, luoghi, emozioni, dialoghi. Quale parola o frase ti colpisce di piu?',
          'In cosa ti senti simile ai discepoli di Emmaus?',
          '"Non ardeva forse in noi il nostro cuore?" Quando e stata l\'ultima volta che hai sentito ardere il cuore? Cosa fa ardere il cuore nella tua vita?',
          'Sento che il cuore arde quando ascolto il Signore?',
          'Cerco attivamente un momento per coltivare questa relazione?'
        ]
      },
      {
        title: 'Servizio',
        subtitle: 'Non per chi lo fa. Per chi ne ha bisogno.',
        questions: [
          "Quando fai servizio, lo fai per gli altri o anche per te stesso? C'e differenza?",
          "C'e un momento in cui il servizio ti ha cambiato, in cui hai ricevuto piu di quanto hai dato? Che cosa hai dato di te e cosa hai ricevuto in cambio?",
          'Qual e la forma di servizio che senti piu tua in questo periodo della tua vita?'
        ]
      },
      {
        title: 'Comunita',
        subtitle: 'Il clan, la vita, gli altri. Il "tu" che e fratello.',
        questions: [
          'In clan, chi senti davvero come compagno di strada in questo momento? Perche gli altri non li senti tali?',
          'Nella comunita piu larga (scuola, lavoro, paese, ...) c\'e un "tu" che senti come fratello o sorella? Come lo vivi?',
          'Come ti relazioni nei confronti di quello che sta succedendo nel resto del mondo? Ti senti parte di questa comunita?',
          'Quali sono le fatiche che senti nel far parte di queste comunita? Che cosa ti danno che non ti aspettavi?'
        ]
      },
      {
        title: 'Io',
        subtitle: 'Il mio essere sulla strada. Dove sono adesso.',
        questions: [
          'Dove senti di essere adesso nel tuo cammino di vita?',
          "C'e qualcosa di te che stai scoprendo in questo periodo? Qualcosa che stai perdendo?",
          'Che sogno hai per la tua vita?'
        ]
      }
    ];

    // ── Colors ──
    const PURPLE = [70, 38, 120];
    const RED    = [231, 64, 48];
    const GREY   = [107, 102, 96];
    const LIGHT  = [247, 245, 242];
    const WHITE  = [255, 255, 255];

    // ── Generate QR as data URL ──
    function makeQR(text, size) {
      const qr = qrcode(0, 'M');
      qr.addData(text);
      qr.make();
      // Create image from QR
      const modules = qr.getModuleCount();
      const canvas = document.createElement('canvas');
      const cellSize = Math.ceil(size * 4 / modules); // hi-res
      canvas.width = canvas.height = modules * cellSize;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#462678';
      for (let r = 0; r < modules; r++)
        for (let c = 0; c < modules; c++)
          if (qr.isDark(r, c))
            ctx.fillRect(c * cellSize, r * cellSize, cellSize, cellSize);
      return canvas.toDataURL('image/png');
    }

    // ── PDF generation ──
    async function genera() {
      const btn = document.getElementById('btn');
      btn.disabled = true;
      btn.textContent = 'Generazione...';

      try {
        const { jsPDF } = window.jspdf;
        // A5: 148 x 210 mm
        const pdf = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a5' });
        const pageW = 148;
        const pageH = 210;
        const margin = 14;
        const contentW = pageW - margin * 2;
        let y = 0;

        // ── Helpers ──
        function drawTopBar() {
          pdf.setFillColor(...PURPLE);
          pdf.rect(0, 0, pageW, 2.5, 'F');
        }

        function drawFooter() {
          pdf.setFontSize(6);
          pdf.setTextColor(180, 180, 180);
          pdf.text('Punto della Strada — Clan Strada Facendo', pageW / 2, pageH - 7, { align: 'center' });
        }

        function drawAccentLine(yPos) {
          pdf.setDrawColor(...PURPLE);
          pdf.setLineWidth(0.4);
          pdf.line(margin, yPos, pageW - margin, yPos);
        }

        function drawDottedLines(startY, count, spacing) {
          for (let i = 0; i < count; i++) {
            const ly = startY + i * spacing;
            pdf.setDrawColor(200, 195, 190);
            pdf.setLineWidth(0.2);
            // Dashed line
            const dashLen = 1.5;
            const gap = 1.5;
            for (let x = margin; x < pageW - margin; x += dashLen + gap) {
              const end = Math.min(x + dashLen, pageW - margin);
              pdf.line(x, ly, end, ly);
            }
          }
          return startY + count * spacing;
        }

        function ensureSpace(needed) {
          if (y + needed > pageH - 14) {
            pdf.addPage();
            drawTopBar();
            drawFooter();
            y = margin + 4;
          }
        }

        // ── Load logo ──
        let logoDataUrl = null;
        try {
          const resp = await fetch('assets/logo.png');
          const blob = await resp.blob();
          logoDataUrl = await new Promise(resolve => {
            const reader = new FileReader();
            reader.onload = () => resolve(reader.result);
            reader.readAsDataURL(blob);
          });
        } catch (e) { /* no logo */ }

        // Generate QR
        const qrDataUrl = makeQR(PUBLIC_URL, 120);

        // ════════════════════════════════════════
        // PAGE 1 — COVER
        // ════════════════════════════════════════
        drawTopBar();

        // Decorative thin red line below bar
        pdf.setDrawColor(...RED);
        pdf.setLineWidth(0.3);
        pdf.line(0, 2.8, pageW, 2.8);

        // Title block
        y = 34;
        pdf.setFont('helvetica', 'bold');
        pdf.setFontSize(26);
        pdf.setTextColor(...PURPLE);
        pdf.text('Punto della Strada', pageW / 2, y, { align: 'center' });

        y += 9;
        pdf.setFontSize(11);
        pdf.setTextColor(...RED);
        pdf.text('R / S', pageW / 2, y, { align: 'center' });

        y += 8;
        drawAccentLine(y);
        y += 10;

        pdf.setFont('helvetica', 'normal');
        pdf.setFontSize(9);
        pdf.setTextColor(...GREY);
        pdf.text('Clan Strada Facendo', pageW / 2, y, { align: 'center' });
        y += 5;
        pdf.text('19 aprile 2026', pageW / 2, y, { align: 'center' });

        // QR Code
        y += 14;
        const qrSize = 36;
        pdf.addImage(qrDataUrl, 'PNG', (pageW - qrSize) / 2, y, qrSize, qrSize);
        y += qrSize + 6;

        // Instructions under QR
        pdf.setFont('helvetica', 'bold');
        pdf.setFontSize(8);
        pdf.setTextColor(...PURPLE);
        pdf.text('Come funziona:', pageW / 2, y, { align: 'center' });
        y += 5;

        pdf.setFont('helvetica', 'normal');
        pdf.setFontSize(7.5);
        pdf.setTextColor(...GREY);
        const instructions = [
          '1.  Inquadra il QR code con il telefono',
          '2.  Inserisci il tuo nome e scegli il tuo codice',
          '3.  Puoi rispondere con penna nel tuo quaderno di caccia',
          '     oppure in digitale dal telefono'
        ];
        instructions.forEach(line => {
          pdf.text(line, pageW / 2, y, { align: 'center' });
          y += 4.5;
        });

        y += 4;
        // Small decorative element
        pdf.setFillColor(...PURPLE);
        pdf.roundedRect(pageW / 2 - 8, y, 16, 0.6, 0.3, 0.3, 'F');

        // Logo at bottom
        if (logoDataUrl) {
          const logoSize = 22;
          pdf.addImage(logoDataUrl, 'PNG', (pageW - logoSize) / 2, pageH - 32, logoSize, logoSize);
        }

        drawFooter();

        // ════════════════════════════════════════
        // NAME FIELD — on cover page bottom area
        // ════════════════════════════════════════
        // (name field on page 2 as a clean space)
        pdf.addPage();
        drawTopBar();
        drawFooter();
        y = margin + 6;

        pdf.setFont('helvetica', 'bold');
        pdf.setFontSize(10);
        pdf.setTextColor(...PURPLE);
        pdf.text('Nome:', margin, y);

        // Underline for name
        pdf.setDrawColor(...PURPLE);
        pdf.setLineWidth(0.4);
        pdf.line(margin + 16, y + 0.5, pageW - margin, y + 0.5);

        y += 6;
        pdf.setDrawColor(200, 195, 190);
        pdf.setLineWidth(0.15);
        pdf.line(margin + 16, y + 0.5, pageW - margin, y + 0.5);
        pdf.setFont('helvetica', 'normal');
        pdf.setFontSize(7);
        pdf.setTextColor(180, 180, 180);
        pdf.text('Codice:', margin, y + 1);

        y += 14;

        // ════════════════════════════════════════
        // AREA PAGES
        // ════════════════════════════════════════
        let globalQ = 0;

        AREAS.forEach((area, areaIdx) => {
          // Area header on current page (or new page if first area)
          if (areaIdx > 0) {
            pdf.addPage();
            drawTopBar();
            drawFooter();
            y = margin + 4;
          }

          // Area title
          pdf.setFont('helvetica', 'bold');
          pdf.setFontSize(18);
          pdf.setTextColor(...PURPLE);
          pdf.text(area.title, margin, y);
          y += 6;

          // Subtitle
          pdf.setFont('helvetica', 'italic');
          pdf.setFontSize(7.5);
          pdf.setTextColor(...GREY);
          const subLines = pdf.splitTextToSize(area.subtitle, contentW);
          pdf.text(subLines, margin, y);
          y += subLines.length * 3.5 + 2;

          drawAccentLine(y);
          y += 8;

          // Questions
          area.questions.forEach((q, qi) => {
            globalQ++;

            // Estimate space needed: question + lines
            const qLines = pdf.splitTextToSize(q, contentW - 10);
            const linesForAnswer = area.questions.length <= 3 ? 7 : 5;
            const lineSpacing = 5.5;
            const neededSpace = qLines.length * 4 + linesForAnswer * lineSpacing + 12;

            ensureSpace(neededSpace);

            // Question number badge
            pdf.setFillColor(...RED);
            pdf.circle(margin + 3, y - 1, 3, 'F');
            pdf.setFont('helvetica', 'bold');
            pdf.setFontSize(7);
            pdf.setTextColor(...WHITE);
            pdf.text(`${qi + 1}`, margin + 3, y + 0.2, { align: 'center' });

            // Question text
            pdf.setFont('helvetica', 'normal');
            pdf.setFontSize(8);
            pdf.setTextColor(50, 45, 40);
            pdf.text(qLines, margin + 9, y);
            y += qLines.length * 4 + 4;

            // Answer lines (dotted)
            y = drawDottedLines(y, linesForAnswer, lineSpacing);
            y += 6;
          });
        });

        // ════════════════════════════════════════
        // NOTES PAGE (last page)
        // ════════════════════════════════════════
        pdf.addPage();
        drawTopBar();
        drawFooter();
        y = margin + 4;

        pdf.setFont('helvetica', 'bold');
        pdf.setFontSize(14);
        pdf.setTextColor(...PURPLE);
        pdf.text('Note', margin, y);
        y += 4;
        drawAccentLine(y);
        y += 8;

        // Full page of dotted lines
        drawDottedLines(y, 28, 6);

        // ── Save ──
        pdf.save('Punto_della_Strada_Fogli_Risposte.pdf');

      } catch (err) {
        console.error(err);
        alert('Errore nella generazione: ' + err.message);
      }

      btn.disabled = false;
      btn.textContent = 'Genera PDF';
    }
  </script>
</body>
</html>
